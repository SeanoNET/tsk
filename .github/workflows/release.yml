name: Release

on:
  push:
    tags: ["[0-9]*"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches package.json version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="$TAG_REF"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            artifact: tsk-linux-x64
            opentui: "@opentui/core-linux-x64"
            can_smoke_test: true
          - target: bun-linux-arm64
            runner: ubuntu-24.04-arm
            artifact: tsk-linux-arm64
            opentui: "@opentui/core-linux-arm64"
            can_smoke_test: true
          - target: bun-darwin-x64
            runner: macos-14
            artifact: tsk-darwin-x64
            opentui: "@opentui/core-darwin-x64"
            can_smoke_test: false
          - target: bun-darwin-arm64
            runner: macos-14
            artifact: tsk-darwin-arm64
            opentui: "@opentui/core-darwin-arm64"
            can_smoke_test: true
          - target: bun-windows-x64
            runner: windows-latest
            artifact: tsk-windows-x64.exe
            opentui: "@opentui/core-win32-x64"
            can_smoke_test: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install target platform native deps
        run: bun add --no-save ${{ matrix.opentui }}
      - name: Build
        run: bun build --compile --target=${{ matrix.target }} src/tsk.ts --outfile dist/${{ matrix.artifact }}
      - name: Smoke test
        run: ./dist/${{ matrix.artifact }} --version
        if: ${{ matrix.can_smoke_test && !contains(matrix.runner, 'windows') }}
      - name: Smoke test (Windows)
        run: .\dist\${{ matrix.artifact }} --version
        if: ${{ matrix.can_smoke_test && contains(matrix.runner, 'windows') }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > tsk-checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
